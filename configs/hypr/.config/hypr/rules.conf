# Hyprland window rules (windowrulev2 syntax)

# Float dialogs and utilities
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(file-roller)$

# Cheatsheet window (floating, centered, sized)
windowrulev2 = float, class:^(kitty)$, title:^(cheatsheet)$
windowrulev2 = size 900 600, class:^(kitty)$, title:^(cheatsheet)$
windowrulev2 = center, class:^(kitty)$, title:^(cheatsheet)$

# Gaming
windowrulev2 = fullscreen, class:^(steam_app_)(.*)$
windowrulev2 = immediate, class:^(steam_app_)(.*)$
windowrulev2 = monitor 0, class:^(steam_app_)(.*)$

# Steam client
windowrulev2 = float, class:^([Ss]team)$, title:^(?!Steam$)
windowrulev2 = float, class:^(steamwebhelper)$

# Browser
windowrulev2 = float, class:^(google-chrome)$, title:^(Save File)$
windowrulev2 = float, class:^(google-chrome)$, title:^(Open File)$

# Discord
windowrulev2 = float, class:^(vesktop|Discord)$, title:^(Open Link)$

# Don't tile Firefox DevTools
windowrulev2 = float, class:^(firefox)$, title:^(Developer Tools)$
