# Hyprland autostart - executed once at Wayland session start
# Order matters for XDG portal (Hyprland portal must start before generic portal)

# Reset environment on Hyprland startup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# XDG portal for screen sharing and other integrations
# Sleep delays are intentional to avoid portal race condition
exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &

# Authentication agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# GNOME Keyring for secrets/SSH
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh

# Status bar
exec-once = waybar

# Notification daemon
exec-once = mako

# Network manager applet
exec-once = nm-applet --indicator

# Bluetooth manager
exec-once = blueman-applet

# Wallpaper daemon
exec-once = awww-daemon
exec-once = awww img ~/.config/wallpapers/default.jpg --transition-type fade

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle and lock screen daemon
exec-once = hypridle
