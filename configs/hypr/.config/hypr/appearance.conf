# Hyprland appearance configuration - Catppuccin Mocha theme

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cba6f7ff) rgba(89b4faff) 45deg
    col.inactive_border = rgba(313244ff)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1e1e2ecc)
    }
}

animations {
    enabled = true
    animation = windows, 1, 5, default
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 5, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vrr = 0
}

xwayland {
    force_zero_scaling = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    repeat_rate = 25
    repeat_delay = 600

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        drag_lock = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
}

dwindle {
    pseudotile = true
    preserve_split = true
}

cursor {
    # Hardware cursors are enabled by default.
    # If you observe cursor flickering or hitching on NVIDIA (shape changes
    # from pointer to resize arrow, etc.), uncomment the line below.
    # This is a known issue on some NVIDIA + Wayland configurations.
    # no_hardware_cursors = true
}
