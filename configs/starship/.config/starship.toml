# Starship prompt configuration - Catppuccin Mocha
# Uses 'catppuccin-powerline' preset for minimal, fast prompt

format = "$username$hostname$directory$git_branch$git_status$cmd_duration$line_break$character"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"

[git_branch]
symbol = " "
style = "bold mauve"

[git_status]
style = "bold red"
disabled = false

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow) "

[username]
format = "[$user]($style)@"
style_user = "bold cyan"
show_always = false

[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "bold blue"
