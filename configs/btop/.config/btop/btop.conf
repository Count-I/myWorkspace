# Btop++ system monitor configuration

# Presets for graphs
presets = "cpu:0:default graphs_upper#cpu|mem#mem split_num#2 L#84 88:0 15 10 33 29|50:0 15 5 33 34:0 15 20 33 15"

# Update rate in milliseconds
update_ms = 100

# Minimum temperature display
min_temp = 20

# Color theme
color_scheme = "TTY"

# View configuration
shown_boxes = "cpu mem disks proc"

# cpu
cpu_count_core = true
cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_invert_lower = true

# Memory
mem_graph_symbol = "default"

# Processes
proc_sorting = "memory%"
proc_tree = true
proc_aggregate = true

# Layout
layout_0 = {"cpu":{"col":0,"row":0,"sizex":2,"sizey":2},"mem":{"col":0,"row":2,"sizex":1,"sizey":2},"disks":{"col":1,"row":2,"sizex":1,"sizey":2},"proc":{"col":2,"row":0,"sizex":2,"sizey":4}}
