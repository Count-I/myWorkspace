# Hyprlock screen lock configuration - Catppuccin Mocha

general {
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = ~/Pictures/wallpapers/default.jpg
    color = rgba(24, 24, 37, 1.0)
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.64
    dots_center = true
    outer_color = rgb(203, 166, 247)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Input password...</i>
}

label {
    monitor =
    text = Hi there!
    text_align = center
    color = rgb(205, 214, 244)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -100
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/.config/hypr/hyprlock_user.png
    size = 100
    border_color = rgb(203, 166, 247)
    position = 0, 75
    halign = center
    valign = center
}
