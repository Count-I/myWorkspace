# MangoHUD configuration - FPS counter + performance overlay

toggle_logging=F11
toggle_hud=F12

# What to show
fps
cpu_temp
gpu_temp
ram
vram
swap
battery
engine_version=OpenGL

# Positioning
position=top-left
horizontal
offset_x=10
offset_y=10

# Appearance
font_size=24
background=0.05,0.05,0.05,0.5
text_color=00ff00

# Behavior
no_display=false
toggle_hud_hotkey=F12
